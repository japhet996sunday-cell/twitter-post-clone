<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Twitter Post Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Post Something</h2>

    <textarea id="postInput" maxlength="200" placeholder="What's happening?"></textarea>

    <div class="bottom">
      <span id="counter">0 / 200</span>
      <button id="postBtn">Post</button>
    </div>

    <div id="postDisplay"></div>
  </div>

  <script src="script.js"></script>
</body>
      </html>
